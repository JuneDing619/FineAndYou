<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>财经 Agent 平台</title>
  <meta name="description" content="财经 Agent 平台场景门户，覆盖流程提效、经营合规、业财融合、经营洞察与风险管控。">
  <style>
    :root {
      --fr-blue-900: #17346e;
      --fr-blue-800: #0055cc;
      --fr-blue-700: #0086e6;
      --fr-blue-500: #3d93ff;
      --fr-cyan: #00ace6;
      --fr-mint: #35db9b;
      --fr-teal: #3fc4a9;
      --fr-indigo: #5c6cff;
      --fr-violet: #7a73fa;
      --fr-amber: #f7b65c;
      --fr-orange: #f39600;
      --fr-page: #edefff;
      --fr-page-soft: #f3fcff;
      --fr-surface: rgba(255, 255, 255, 0.82);
      --fr-surface-strong: rgba(255, 255, 255, 0.96);
      --fr-surface-blue: rgba(232, 244, 255, 0.78);
      --fr-line: rgba(184, 190, 204, 0.62);
      --fr-line-blue: rgba(0, 134, 230, 0.16);
      --fr-text: #0f0f0f;
      --fr-text-title: #17346e;
      --fr-text-body: #566280;
      --fr-text-subtle: #8f99b3;
      --fr-success: #1f9d62;
      --fr-shadow-sm: 0 10px 26px rgba(0, 85, 204, 0.08);
      --fr-shadow-md: 0 18px 48px rgba(0, 85, 204, 0.12);
      --fr-shadow-lg: 0 28px 72px rgba(0, 85, 204, 0.14);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 10px;
      --container: 1320px;
      --ease: 220ms cubic-bezier(.2, .8, .2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--fr-text);
      font-family: "Microsoft YaHei", "PingFang SC", "SF Pro Display", Arial, sans-serif;
      background:
        radial-gradient(circle at 8% 8%, rgba(0, 134, 230, 0.16), transparent 24%),
        radial-gradient(circle at 92% 4%, rgba(0, 172, 230, 0.13), transparent 20%),
        radial-gradient(circle at 46% 92%, rgba(92, 108, 255, 0.1), transparent 28%),
        linear-gradient(180deg, #f8fcff 0%, var(--fr-page-soft) 44%, var(--fr-page) 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 134, 230, 0.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 134, 230, 0.026) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.86), transparent 95%);
    }

    body::after {
      content: "";
      position: fixed;
      top: 110px;
      right: -150px;
      z-index: -1;
      width: 480px;
      height: 480px;
      border-radius: 34px;
      transform: rotate(45deg);
      pointer-events: none;
      opacity: 0.36;
      background:
        radial-gradient(circle, rgba(0, 134, 230, 0.2) 0 13px, transparent 14px 28px, rgba(0, 172, 230, 0.14) 29px 40px, transparent 41px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      background: none;
      cursor: pointer;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .shell {
      width: min(calc(100% - 32px), var(--container));
      margin: 0 auto;
      padding: 18px 0 34px;
    }

    .topbar {
      position: sticky;
      top: 14px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 18px;
      min-height: 68px;
      padding: 14px 20px;
      border: 1px solid rgba(218, 222, 230, 0.76);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(245, 251, 255, 0.84)),
        var(--fr-surface);
      box-shadow: var(--fr-shadow-sm);
      backdrop-filter: blur(18px) saturate(130%);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 12px;
    }

    .brand-mark {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-mark img {
      display: block;
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .btn svg,
    .icon-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .brand-copy {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .brand-title {
      color: var(--fr-text-title);
      font-size: clamp(1.08rem, 1.5vw, 1.36rem);
      font-weight: 900;
      line-height: 1.24;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-subtitle {
      color: var(--fr-text-body);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .hero {
      position: relative;
      overflow: hidden;
      margin-top: 18px;
      border: 1px solid rgba(218, 222, 230, 0.76);
      border-radius: 24px;
      background:
        radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.95), transparent 34%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(243, 250, 255, 0.9));
      box-shadow: var(--fr-shadow-md);
      padding: 22px 28px;
    }

    .hero::before,
    .section-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 100% 0, rgba(0, 172, 230, 0.1), transparent 26%),
        radial-gradient(circle at 0 100%, rgba(0, 134, 230, 0.08), transparent 20%);
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 12px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      min-height: 34px;
      padding: 0 14px;
      border: 1px solid rgba(0, 134, 230, 0.14);
      border-radius: 999px;
      color: var(--fr-blue-700);
      background: rgba(232, 244, 255, 0.88);
      font-size: 0.84rem;
      font-weight: 900;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--fr-blue-700), var(--fr-cyan));
      box-shadow: 0 0 0 6px rgba(0, 134, 230, 0.1);
    }

    .hero-copy {
      display: grid;
      gap: 10px;
      align-content: center;
    }

    .hero h1 {
      color: var(--fr-text-title);
      font-size: clamp(1.08rem, 2vw, 1.7rem);
      line-height: 1.25;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hero h1 span {
      color: var(--fr-blue-700);
    }

    .hero-desc {
      max-width: 1040px;
      color: var(--fr-text-body);
      font-size: 0.96rem;
      line-height: 1.68;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 900;
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease), background var(--ease);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--fr-blue-700), var(--fr-blue-800));
      box-shadow: 0 16px 28px rgba(0, 134, 230, 0.22);
    }

    .btn-primary:hover {
      box-shadow: 0 20px 34px rgba(0, 134, 230, 0.28);
    }

    .btn-secondary {
      color: var(--fr-blue-700);
      border: 1px solid rgba(0, 134, 230, 0.18);
      background: rgba(255, 255, 255, 0.84);
    }

    .btn-secondary:hover {
      border-color: rgba(0, 134, 230, 0.3);
      box-shadow: 0 12px 22px rgba(0, 134, 230, 0.08);
    }

    .hero-visual {
      position: relative;
      min-height: 360px;
      border: 1px solid rgba(0, 134, 230, 0.1);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(232, 244, 255, 0.72)),
        rgba(255, 255, 255, 0.8);
      box-shadow: var(--fr-shadow-sm);
      overflow: hidden;
    }

    .hero-visual::before {
      content: "";
      position: absolute;
      inset: 22px;
      border: 1px dashed rgba(0, 134, 230, 0.18);
      border-radius: 20px;
    }

    .orbit {
      position: absolute;
      inset: 40px;
      border-radius: 50%;
      border: 1px solid rgba(0, 134, 230, 0.13);
      animation: spin 28s linear infinite;
    }

    .orbit:nth-child(2) {
      inset: 78px;
      border-color: rgba(92, 108, 255, 0.16);
      animation-duration: 22s;
      animation-direction: reverse;
    }

    .agent-node {
      position: absolute;
      display: grid;
      place-items: center;
      width: 68px;
      height: 68px;
      border-radius: 22px;
      color: #fff;
      background: linear-gradient(135deg, var(--node-a), var(--node-b));
      box-shadow: 0 20px 34px rgba(0, 85, 204, 0.16);
    }

    .agent-node svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .node-center {
      top: 50%;
      left: 50%;
      width: 96px;
      height: 96px;
      transform: translate(-50%, -50%);
      --node-a: var(--fr-blue-700);
      --node-b: var(--fr-blue-800);
    }

    .node-1 {
      top: 34px;
      left: 68px;
      --node-a: var(--fr-mint);
      --node-b: var(--fr-teal);
    }

    .node-2 {
      top: 66px;
      right: 54px;
      --node-a: var(--fr-violet);
      --node-b: var(--fr-indigo);
    }

    .node-3 {
      right: 86px;
      bottom: 46px;
      --node-a: var(--fr-amber);
      --node-b: var(--fr-orange);
    }

    .node-4 {
      left: 44px;
      bottom: 72px;
      --node-a: var(--fr-cyan);
      --node-b: var(--fr-blue-500);
    }

    .visual-pill {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 24px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .visual-pill span {
      display: grid;
      gap: 4px;
      min-height: 64px;
      padding: 12px;
      border: 1px solid rgba(0, 134, 230, 0.1);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--fr-text-body);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .visual-pill strong {
      color: var(--fr-text-title);
      font-size: 1.08rem;
      line-height: 1;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .stat-card {
      display: grid;
      gap: 8px;
      min-height: 104px;
      padding: 18px;
      border: 1px solid rgba(0, 134, 230, 0.1);
      border-radius: 18px;
      background: var(--fr-surface);
      box-shadow: var(--fr-shadow-sm);
    }

    .stat-card strong {
      color: var(--fr-text-title);
      font-size: clamp(1.42rem, 2.6vw, 2.1rem);
      line-height: 1;
    }

    .stat-card span {
      color: var(--fr-text-body);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .tabs-wrap {
      position: sticky;
      top: 96px;
      z-index: 18;
      margin-top: 20px;
      padding: 12px;
      border: 1px solid rgba(218, 222, 230, 0.72);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 18px 36px rgba(0, 85, 204, 0.05);
      backdrop-filter: blur(14px);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(0, 134, 230, 0.28) transparent;
    }

    .tabs {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
      min-width: max-content;
    }

    .tab-btn {
      display: grid;
      flex: 1 0 166px;
      gap: 3px;
      align-content: center;
      justify-items: center;
      min-height: 64px;
      padding: 12px 14px;
      border: 1px solid transparent;
      border-radius: 16px;
      color: var(--fr-text-body);
      white-space: nowrap;
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease), background var(--ease), color var(--ease);
    }

    .tab-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 85, 204, 0.1);
      background: rgba(255, 255, 255, 0.76);
    }

    .tab-btn strong {
      color: inherit;
      font-size: 0.94rem;
      line-height: 1.35;
    }

    .tab-btn span {
      color: inherit;
      font-size: 0.76rem;
      line-height: 1.3;
    }

    .tab-btn.is-active {
      color: #fff;
      border-color: rgba(0, 134, 230, 0.28);
      background: linear-gradient(180deg, rgba(0, 134, 230, 0.98), rgba(0, 85, 204, 0.98));
      box-shadow: 0 18px 30px rgba(0, 134, 230, 0.2);
    }

    .section-card {
      position: relative;
      overflow: hidden;
      margin-top: 20px;
      padding: 28px;
      border: 1px solid rgba(218, 222, 230, 0.76);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(243, 250, 255, 0.92));
      box-shadow: var(--fr-shadow-md);
    }

    .section-head {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .section-title {
      position: relative;
      padding-left: 16px;
      color: var(--fr-text-title);
      font-size: clamp(1.12rem, 1.45vw, 1.42rem);
      line-height: 1.2;
    }

    .section-title::before {
      content: "";
      position: absolute;
      top: 0.16em;
      bottom: 0.16em;
      left: 0;
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--fr-blue-700), var(--fr-cyan));
      box-shadow: 0 0 0 6px rgba(204, 228, 255, 0.9);
    }

    .section-desc {
      max-width: 560px;
      color: var(--fr-text-body);
      font-size: 0.95rem;
      line-height: 1.72;
    }

    .agent-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .agent-card {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 340px;
      overflow: hidden;
      border: 1px solid rgba(218, 222, 230, 0.9);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 12px 30px rgba(23, 52, 110, 0.08);
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
    }

    .agent-card:hover {
      transform: translateY(-2px);
      border-color: rgba(0, 134, 230, 0.2);
      box-shadow: 0 18px 38px rgba(23, 52, 110, 0.11);
    }

    .agent-card.is-hidden {
      display: none;
    }

    .card-main {
      display: grid;
      gap: 14px;
      padding: 24px 24px 20px;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .category-tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border: 1px solid rgba(0, 134, 230, 0.14);
      border-radius: 999px;
      color: var(--fr-blue-700);
      background: rgba(232, 244, 255, 0.88);
      font-size: 0.74rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 8px;
      color: var(--fr-success);
      background: rgba(31, 157, 98, 0.12);
      font-size: 0.74rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .agent-title {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 12px;
      color: var(--fr-text-title);
      font-size: clamp(0.96rem, 1.15vw, 1.08rem);
      line-height: 1.3;
    }

    .agent-title-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .title-icon {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      color: #fff;
      background: linear-gradient(135deg, var(--fr-blue-700), var(--fr-cyan));
      box-shadow: 0 10px 20px rgba(0, 134, 230, 0.12);
    }

    .title-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .pain {
      color: var(--fr-text-body);
      font-size: 0.88rem;
      font-weight: 400;
      line-height: 1.72;
    }

    .pain mark {
      padding: 0 2px;
      color: var(--fr-blue-800);
      background: transparent;
    }

    .pain .ai {
      color: var(--fr-orange);
    }

    .agent-meta {
      display: grid;
      gap: 9px;
      margin-top: 2px;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 12px;
      align-items: baseline;
      color: var(--fr-text-body);
      font-size: 0.88rem;
      line-height: 1.55;
    }

    .meta-label {
      color: var(--fr-text-body);
    }

    .meta-value {
      color: #2f3b52;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-actions {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      min-height: 64px;
      padding: 12px 24px;
      border-top: 1px solid rgba(218, 222, 230, 0.78);
      background: rgba(255, 255, 255, 0.76);
    }

    .action-tags {
      display: flex;
      gap: 10px;
      min-width: 0;
    }

    .link-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid rgba(0, 134, 230, 0.16);
      border-radius: 10px;
      color: var(--fr-blue-700);
      background: rgba(232, 244, 255, 0.72);
      font-size: 0.76rem;
      font-weight: 700;
      box-shadow: none;
      transition: color var(--ease), background var(--ease), transform var(--ease), box-shadow var(--ease), border-color var(--ease);
    }

    .link-action:hover {
      color: var(--fr-blue-800);
      background: rgba(232, 244, 255, 0.96);
      border-color: rgba(0, 134, 230, 0.28);
      box-shadow: 0 8px 18px rgba(0, 134, 230, 0.08);
      transform: translateY(-2px);
    }

    .link-action.demo {
      color: var(--fr-blue-700);
      background: rgba(232, 244, 255, 0.72);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(10, 31, 62, 0.34);
      backdrop-filter: blur(12px);
    }

    .modal.is-open {
      display: flex;
    }

    .modal-panel {
      position: relative;
      width: min(920px, 100%);
      max-height: min(780px, calc(100vh - 44px));
      overflow: auto;
      border: 1px solid rgba(218, 222, 230, 0.76);
      border-radius: 28px;
      background:
        radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.98), transparent 34%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(243, 250, 255, 0.96));
      box-shadow: 0 30px 90px rgba(0, 31, 84, 0.26);
      animation: modal-in 180ms ease;
    }

    @keyframes modal-in {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      padding: 26px 28px 18px;
      border-bottom: 1px solid rgba(0, 134, 230, 0.1);
    }

    .modal-title-wrap {
      display: grid;
      gap: 12px;
    }

    .modal-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .modal h2 {
      color: var(--fr-text-title);

        accent: ["#f39600", "#f7b65c"],
        pain: '供应商财务、交付、合规、舆情风险分散在多个系统？<br><span class="ai">AI</span> 汇总评分并提前预警。',
        problem: "供应商风险发现滞后，采购、财务、法务信息不能形成统一判断",
        role: "采购 / 财务 / 内控 / 风险管理",
        value: "构建主动式财务风险防线，将风险消灭在萌芽状态",
        summary: "Agent 综合供应商交易、付款、发票、履约、工商、诉讼和舆情信息，形成动态风险评分和预警建议，支持准入、续约和付款前检查。",
        details: {
          scene: ["供应商准入评估", "付款前风险复核", "存量供应商周期巡检"],
          workflow: ["汇聚内外部风险数据", "计算信用、履约、合规和财务风险评分", "对高风险供应商触发预警和处置建议"],
          outputs: ["供应商风险画像", "评分卡与风险等级", "预警清单和处置建议"]
        }
      }
    ];

    const categoryValue = {
      efficiency: '用 AI 替代人工重复劳动，让财经团队从"搬运工"变成"分析师"',
      compliance: '让合规审查从"事后检查"变成"事前拦截"，构建全流程合规防线',
      integration: '打通业务与财务的数据孤岛，让财务数据真正反映经营实况',
      insight: '从海量财经数据中自动提炼洞察，让管理者"看得清、看得快、看得准"',
      risk: '构建主动式财务风险防线，将风险消灭在萌芽状态'
    };

    const grid = document.querySelector("#agentGrid");
    const modal = document.querySelector("#agentModal");
    const modalCategory = document.querySelector("#modalCategory");
    const modalTitle = document.querySelector("#modalTitle");
    const modalSummary = document.querySelector("#modalSummary");
    const modalDetails = document.querySelector("#modalDetails");
    const modalDemo = document.querySelector("#modalDemo");
    const closeButtons = [document.querySelector("#closeModal"), document.querySelector("#closeModalBottom")];

    function renderCards() {
      grid.innerHTML = agents.map((agent) => `
        <article class="agent-card" data-category="${agent.categoryKey}" style="--accent-a:${agent.accent[0]};--accent-b:${agent.accent[1]}">
          <div class="card-main">
            <div class="card-head">
              <h3 class="agent-title">
                <span class="title-icon" aria-hidden="true">${icons[agent.icon]}</span>
                <span class="agent-title-text">${agent.title}</span>
              </h3>
              <span class="status">可试用</span>
            </div>
            <p class="pain">${agent.pain}</p>
            <div class="agent-meta">
              <div class="meta-row"><span class="meta-label">场景分类</span><span class="meta-value">${agent.category}</span></div>
              <div class="meta-row"><span class="meta-label">适用角色</span><span class="meta-value">${agent.role}</span></div>
              <div class="meta-row"><span class="meta-label">核心价值</span><span class="meta-value">${agent.value}</span></div>
            </div>
          </div>
          <div class="card-actions">
            <div class="action-tags">
              <button class="link-action" type="button" data-detail="${agent.id}">Agent详情</button>
              <a class="link-action demo" href="${demoBase}?scene=${agent.id}" target="_blank" rel="noopener">DEMO查看</a>
            </div>
          </div>
        </article>
      `).join("");
    }

    function setFilter(filter) {
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.classList.toggle("is-active", btn.dataset.filter === filter);
      });
      document.querySelectorAll(".agent-card").forEach((card) => {
        card.classList.toggle("is-hidden", filter !== "all" && card.dataset.category !== filter);
      });
    }

    function detailCard(title, items) {
      return `
        <div class="detail-card">
          <strong>${title}</strong>
          <ul>${items.map((item) => `<li>${item}</li>`).join("")}</ul>
        </div>
      `;
    }

    function openModal(agentId) {
      const agent = agents.find((item) => item.id === agentId);
      if (!agent) return;
      modalCategory.textContent = agent.category;
      modalTitle.textContent = agent.title;
      modalSummary.textContent = agent.summary;
      modalDemo.href = `${demoBase}?scene=${agent.id}`;
      modalDetails.innerHTML = `
        <div class="detail-card">
          <strong>分类价值主张</strong>
          <p>${categoryValue[agent.categoryKey]}</p>
        </div>
        ${detailCard("典型业务场景", agent.details.scene)}
        ${detailCard("Agent 工作流", agent.details.workflow)}
        ${detailCard("关键输出物", agent.details.outputs)}
        <div class="detail-card">
          <strong>适用团队</strong>
          <p>${agent.role}</p>
        </div>
        <div class="detail-card">
          <strong>预期收益</strong>
          <p>${agent.value.replace(/<[^>]*>/g, "")}</p>
        </div>
      `;
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      document.querySelector("#closeModal").focus();
    }

    function closeModal() {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    renderCards();

    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => setFilter(btn.dataset.filter));
    });

    grid.addEventListener("click", (event) => {
      const detailButton = event.target.closest("[data-detail]");
      if (detailButton) {
        openModal(detailButton.dataset.detail);
      }
    });

    closeButtons.forEach((button) => button.addEventListener("click", closeModal));

    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("is-open")) {
        closeModal();
      }
    });
  </script>
</body>
</html>
